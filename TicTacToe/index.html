<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>Tic Tac Toe</h1>
    <div class="options">
      <label>Choose Your Marker:</label>
      <button id="btnX" onclick="chooseMarker('X', this)">X</button>
      <button id="btnO" onclick="chooseMarker('O', this)">O</button>
      <button id="btnSingle" onclick="setMode('single', this)">Single Player</button>
      <button id="btnMulti" onclick="setMode('multi', this)">Two Player</button>
    </div>
    <div id="board" class="board"></div>
    <div class="scoreboard">
      <p>X: <span id="scoreX">0</span> | O: <span id="scoreO">0</span></p>
    </div>
  </div>

  <!-- Result Modal -->
  <div id="resultModal" class="modal">
    <div class="modal-content">
      <span id="modalText"></span>
      <div id="sadEffect"></div>
      <button id="closeModal">Close</button>
    </div>
  </div>

  <!-- Confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
